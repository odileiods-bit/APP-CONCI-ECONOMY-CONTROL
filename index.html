<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falou, Lançou</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-dim2: rgba(0,229,160,0.06);
    --text: #f0f0f2;
    --text-muted: #6b6b78;
    --text-mid: #a0a0b0;
    --danger: #ff5c5c;
    --amber: #ffb830;
    --blue: #4d9fff;
    --purple: #a78bfa;
    --pink: #f472b6;
    --coral: #fb7185;
    --cat-alimentacao: #00e5a0;
    --cat-transporte: #4d9fff;
    --cat-saude: #f472b6;
    --cat-lazer: #a78bfa;
    --cat-casa: #ffb830;
    --cat-outros: #6b6b78;
    --cat-educacao: #38bdf8;
    --cat-tecnologia: #818cf8;
    --cat-vestuario: #fb923c;
    --cat-pets: #34d399;
    --cat-viagem: #f59e0b;
    --cat-servicos: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 480px;
    padding: 32px 20px 0;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .tagline {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* TOTAL CARD */
  .total-card {
    width: 100%;
    max-width: 480px;
    margin: 24px 20px 0;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  .total-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .total-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .total-value {
    font-size: 40px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -2px;
    line-height: 1;
  }
  .total-value .currency {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0;
    margin-right: 2px;
  }
  .total-period {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
  }
  .cats-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .cat-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-mid);
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
  .cat-pill.ativa { border-color: var(--accent); background: rgba(0,229,160,0.1); color: var(--accent); }
  .cat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* INPUT AREA */
  .input-area {
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
    margin-top: 16px;
  }
  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0;
  }
  #gasto-input {
    width: 100%;
    padding: 16px 104px 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }
  #gasto-input:focus { border-color: var(--accent); }
  #gasto-input::placeholder { color: var(--text-muted); }
  .send-btn {
    position: absolute;
    right: 10px;
    width: 38px; height: 38px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, opacity 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; fill: #0e0e10; }
  .mic-btn {
    position: absolute;
    right: 56px;
    width: 38px; height: 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--accent); }
  .mic-btn svg { width: 16px; height: 16px; fill: var(--text-mid); transition: fill 0.2s; }
  .mic-btn:hover svg { fill: var(--accent); }
  .mic-btn.gravando {
    background: rgba(255,92,92,0.15);
    border-color: var(--danger);
    animation: pulsar 1s infinite;
  }
  .mic-btn.gravando svg { fill: var(--danger); }
  @keyframes pulsar {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,92,92,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(255,92,92,0); }
  }
  .input-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    padding: 0 4px;
  }



  /* FILTRO DE MÊS */
  @keyframes filtroPulso {
    0%,100% { background: rgba(0,229,160,0.06); border-color: rgba(0,229,160,0.20); }
    50%      { background: rgba(0,229,160,0.14); border-color: rgba(0,229,160,0.50); }
  }
  .filtro-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin: 10px 0 0;
    padding: 8px 12px;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.25);
    border-radius: 8px;
  }
  .filtro-bar.visivel { display: flex; }
  .filtro-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .filtro-remover {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filtro-remover:hover { color: var(--accent); border-color: var(--accent); }
  .filtro-bar.visivel .filtro-remover { animation: filtroPulso 2.4s ease-in-out infinite; }
  @keyframes filtroPulso {
    0%,100% { border-color: var(--border); color: var(--text-muted); }
    50%      { border-color: var(--accent); color: var(--accent); }
  }


  /* BOTÃO EXPORTAR PDF */
  @keyframes exportPulso {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,229,160,0.4); }
    50%      { box-shadow: 0 0 0 7px rgba(0,229,160,0); }
  }
  .export-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 28px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #0e0e10;
    font-size: 13px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: opacity 0.2s;
    margin: 16px auto 0;
    width: calc(100% - 40px);
    max-width: 480px;
    animation: exportPulso 2s ease-in-out infinite;
  }
  .export-btn:hover { opacity: 0.85; }
  .export-btn svg { width: 15px; height: 15px; fill: currentColor; }

  /* MODAL DE SELEÇÃO */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.visivel { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }
  .modal-title {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .mes-opcoes {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 260px;
    overflow-y: auto;
    margin-bottom: 16px;
  }
  .mes-opcao {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .mes-opcao:hover { border-color: var(--accent); }
  .mes-opcao.selecionado { border-color: var(--accent); background: rgba(0,229,160,0.08); }
  .mes-opcao-check {
    width: 16px; height: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .mes-opcao.selecionado .mes-opcao-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .mes-opcao.selecionado .mes-opcao-check::after {
    content: '✓';
    font-size: 10px;
    color: #0e0e10;
    font-weight: 700;
  }
  .mes-opcao-info { flex: 1; }
  .mes-opcao-nome {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text-light);
  }
  .mes-opcao-total {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .modal-btn-cancel:hover { border-color: var(--text-muted); }
  .modal-btn-gerar {
    background: var(--accent);
    border: none;
    color: #0e0e10;
    font-weight: 700;
  }
  .modal-btn-gerar:hover { opacity: 0.9; }
  .modal-btn-gerar:disabled { opacity: 0.4; cursor: not-allowed; }

  /* GRÁFICO DE ROSCA */
  .grafico-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    gap: 12px;
  }
  .grafico-wrap.visivel { display: flex; }
  .grafico-svg { overflow: visible; }
  .grafico-legenda {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 340px;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-mid);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .leg-item.destaques { opacity: 1; }
  .leg-item.apagado { opacity: 0.25; }
  .leg-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ESTADO DE PROCESSAMENTO */
  .processing {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    background: var(--accent-dim2);
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: 10px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }
  .processing.show { display: flex; }
  .dot-anim { display: flex; gap: 3px; }
  .dot-anim span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1s infinite;
  }
  .dot-anim span:nth-child(2) { animation-delay: 0.15s; }
  .dot-anim span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* HISTÓRICO */
  .section-label {
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 10px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .clear-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .clear-btn:hover { color: var(--danger); background: rgba(255,92,92,0.08); }

  .history-list {
    width: 100%;
    max-width: 480px;
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }
  .gasto-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .gasto-cat-bar {
    width: 3px;
    height: 36px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .gasto-info { flex: 1; min-width: 0; }
  .gasto-desc {
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gasto-meta {
    display: flex;
    gap: 8px;
    margin-top: 3px;
    align-items: center;
  }
  .gasto-cat-tag {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
  }
  .gasto-time {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
  }
  .gasto-valor {
    font-size: 16px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    flex-shrink: 0;
  }
  .delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: var(--danger); }
  .delete-btn svg { width: 14px; height: 14px; }

  /* CONSULTA RESPOSTA */
  .consulta-resp {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
    margin-top: 4px;
  }
  .consulta-resp.show { display: block; }
  .consulta-card {
    background: var(--accent-dim);
    border: 1px solid rgba(0,229,160,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">falou<span>,</span> lançou</div>
  <div class="tagline">// beta</div>
</header>

<!-- TOTAL -->
<div class="total-card" style="max-width:480px;width:calc(100% - 40px)">
  <div class="total-label" id="total-label">total do mês</div>
  <div class="total-value">
    <span class="currency">R$</span><span id="total-num">0,00</span>
  </div>
  <div class="total-period" id="total-period">nenhum gasto ainda</div>
  <div class="cats-row" id="cats-row"></div>
  <div class="filtro-bar" id="filtro-bar">
    <span class="filtro-label" id="filtro-label">visualizando: —</span>
    <button class="filtro-remover" onclick="removerFiltro()">✕ remover filtro</button>
  </div>
  <div class="grafico-wrap" id="grafico-wrap">
    <svg class="grafico-svg" id="grafico-svg" width="180" height="180" viewBox="0 0 180 180"></svg>
    <div class="grafico-legenda" id="grafico-legenda"></div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrap">
    <input
      type="text"
      id="gasto-input"
      placeholder='ex: "padaria 47" ou "total do mês"'
      autocomplete="off"
    />
    <button class="mic-btn" id="mic-btn" onclick="alternarMic()" title="Falar">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v8a1 1 0 0 1-2 0V4zM7 11a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.92V21h-2v-3.08A7 7 0 0 1 5 11h2z"/></svg>
    </button>
    <button class="send-btn" id="send-btn" onclick="processar()">
      <svg viewBox="0 0 16 16"><path d="M14 8L2 2l2.5 6L2 14l12-6z"/></svg>
    </button>
  </div>
  <div class="input-hint">fale o gasto ou faça uma pergunta</div>
  <div class="processing" id="processing">
    <div class="dot-anim"><span></span><span></span><span></span></div>
    <span id="processing-text">processando...</span>
  </div>
</div>

<!-- RESPOSTA CONSULTA -->
<div class="consulta-resp" id="consulta-resp">
  <div class="consulta-card" id="consulta-card"></div>
</div>

<!-- HISTÓRICO -->
<div class="section-label">
  <span>histórico</span>
  <button class="clear-btn" onclick="limparTudo()">limpar tudo</button>
</div>

<button class="export-btn" onclick="abrirModalPDF()">
  <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 17v-1h8v1H8zm0-3v-1h8v1H8zm0-3v-1h5v1H8z"/></svg>
  exportar PDF
</button>

<!-- MODAL PDF -->
<div class="modal-overlay" id="modal-pdf">
  <div class="modal-box">
    <div class="modal-title">exportar relatório</div>
    <div class="mes-opcoes" id="mes-opcoes"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="fecharModalPDF()">cancelar</button>
      <button class="modal-btn modal-btn-gerar" id="btn-gerar-pdf" onclick="gerarPDF()" disabled>gerar PDF</button>
    </div>
  </div>
</div>

<div class="history-list" id="history-list">
  <div class="empty-state">nenhum gasto registrado ainda</div>
</div>

<script>
const STORAGE_KEY = 'falou_lancou_gastos_v1';
const PARCELAS_KEY = 'falou_lancou_parcelas_v1';
const CAT_COLORS = {
  'alimentação': '#00e5a0',
  'transporte':  '#4d9fff',
  'saúde':       '#f472b6',
  'lazer':       '#a78bfa',
  'casa':        '#ffb830',
  'outros':      '#6b6b78',
  'educação':    '#38bdf8',
  'tecnologia':  '#818cf8',
  'vestuário':   '#fb923c',
  'pets':        '#34d399',
  'viagem':      '#f59e0b',
  'serviços':    '#94a3b8',
};

let gastos = [];
let parcelasFuturas = [];

function loadParcelas() {
  try {
    const raw = localStorage.getItem(PARCELAS_KEY);
    if (raw) parcelasFuturas = JSON.parse(raw);
  } catch(e) { parcelasFuturas = []; }
}
function saveParcelas() {
  localStorage.setItem(PARCELAS_KEY, JSON.stringify(parcelasFuturas));
}
function verificarParcelasDoMes() {
  const agora = new Date();
  const chave = `${agora.getFullYear()}-${agora.getMonth()}`;
  const jaProcessado = localStorage.getItem('falou_parcelas_processadas_' + chave);
  if (jaProcessado) return;
  const vencendo = parcelasFuturas.filter(p => {
    const d = new Date(p.vencimento);
    return d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
  });
  vencendo.forEach(p => {
    gastos.push({
      id: Date.now().toString() + Math.random(),
      valor: p.valor,
      descricao: p.descricao,
      categoria: p.categoria,
      ts: new Date(p.vencimento).setDate(1),
      parcelaInfo: p.parcelaInfo
    });
  });
  parcelasFuturas = parcelasFuturas.filter(p => {
    const d = new Date(p.vencimento);
    return !(d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear());
  });
  if (vencendo.length > 0) {
    saveGastos();
    saveParcelas();
  }
  localStorage.setItem('falou_parcelas_processadas_' + chave, '1');
}

function loadGastos() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) gastos = JSON.parse(raw);
  } catch(e) { gastos = []; }
  loadParcelas();
  verificarParcelasDoMes();
}
function saveGastos() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(gastos));
}

function formatMoeda(v) {
  return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function formatHora(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }) +
    ' ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}


// ESTADO DO FILTRO
let filtroAtivo = null; // { ano, mes } ou null

const MESES_PT = {
  'janeiro':1,'fevereiro':2,'março':3,'abril':4,'maio':5,'junho':6,
  'julho':7,'agosto':8,'setembro':9,'outubro':10,'novembro':11,'dezembro':12
};

function detectarMesTexto(texto) {
  const t = texto.toLowerCase();
  for (const [nome, num] of Object.entries(MESES_PT)) {
    if (t.includes(nome)) {
      const agora = new Date();
      let ano = agora.getFullYear();
      // Se o mês já passou neste ano, assume próximo ano
      if (num - 1 < agora.getMonth()) ano++;
      return { ano, mes: num - 1 }; // mes 0-indexed
    }
  }
  // "próximo mês"
  if (t.includes('próximo') || t.includes('futuro')) {
    const agora = new Date();
    const prox = new Date(agora.getFullYear(), agora.getMonth() + 1, 1);
    return { ano: prox.getFullYear(), mes: prox.getMonth() };
  }
  return null;
}

function aplicarFiltro(filtro) {
  filtroAtivo = filtro;
  const nomeMes = new Date(filtro.ano, filtro.mes, 1)
    .toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  document.getElementById('filtro-label').textContent = `visualizando: ${nomeMes}`;
  document.getElementById('filtro-bar').classList.add('visivel');
  document.getElementById('total-label').textContent = `total · ${nomeMes}`;
  renderComFiltro(filtro);
}

function removerFiltro() {
  filtroAtivo = null;
  document.getElementById('filtro-bar').classList.remove('visivel');
  document.getElementById('total-label').textContent = 'total do mês';
  atualizarTotal();
  renderHistorico();
}

function renderComFiltro(filtro) {
  // Gastos reais do mês filtrado
  const gastosDoMes = gastos.filter(g => {
    const d = new Date(g.ts);
    return d.getMonth() === filtro.mes && d.getFullYear() === filtro.ano;
  });
  // Parcelas futuras do mês filtrado
  const parcelasDoMes = parcelasFuturas.filter(p => {
    const d = new Date(p.vencimento);
    return d.getMonth() === filtro.mes && d.getFullYear() === filtro.ano;
  });
  const todosItens = [...gastosDoMes, ...parcelasDoMes.map(p => ({
    ...p, ts: new Date(p.vencimento).getTime(), _agendado: true
  }))];

  // Atualizar total card
  const total = todosItens.reduce((s, g) => s + g.valor, 0);
  document.getElementById('total-num').textContent = formatMoeda(total);
  if (todosItens.length === 0) {
    document.getElementById('total-period').textContent = 'nenhum gasto neste mês';
    document.getElementById('cats-row').innerHTML = '';
    document.getElementById('grafico-wrap').classList.remove('visivel');
  } else {
    document.getElementById('total-period').textContent =
      `${todosItens.length} lançamento${todosItens.length>1?'s':''}`;
    const porCat = {};
    todosItens.forEach(g => { porCat[g.categoria] = (porCat[g.categoria]||0) + g.valor; });
    const pillsHtml = Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([cat, val]) =>
      `<div class="cat-pill${categoriaDestacada === cat ? ' ativa' : ''}" onclick="destacarCategoria('${cat}')">
        <div class="cat-dot" style="background:${CAT_COLORS[cat]||CAT_COLORS['outros']}"></div>
        ${cat} · R$ ${formatMoeda(val)}
      </div>`
    ).join('');
    document.getElementById('cats-row').innerHTML = pillsHtml;
    desenharGrafico(porCat, total, categoriaDestacada);
  }

  // Atualizar histórico
  const list = document.getElementById('history-list');
  if (todosItens.length === 0) {
    list.innerHTML = '<div class="empty-state">nenhum gasto neste mês</div>';
    return;
  }
  const sorted = [...todosItens].sort((a,b) => b.ts - a.ts);
  list.innerHTML = sorted.map(g => {
    const cor = CAT_COLORS[g.categoria] || CAT_COLORS['outros'];
    const agendadoTag = g._agendado
      ? `<span style="font-size:9px;opacity:0.5;margin-left:4px">agendado</span>` : '';
    return `
    <div class="gasto-item" id="item-${g.id}">
      <div class="gasto-cat-bar" style="background:${cor}"></div>
      <div class="gasto-info">
        <div class="gasto-desc">${g.descricao}${g.parcelaInfo ? ` <span style="font-size:10px;opacity:0.6">(${g.parcelaInfo})</span>` : ''}${agendadoTag}</div>
        <div class="gasto-meta">
          <span class="gasto-cat-tag" style="color:${cor}">${g.categoria}</span>
          <span class="gasto-time">${formatHora(g.ts)}</span>
        </div>
      </div>
      <div class="gasto-valor">R$ ${formatMoeda(g.valor)}</div>
      ${!g._agendado ? `<button class="delete-btn" onclick="deletarGasto('${g.id}')">
        <svg viewBox="0 0 14 14" fill="currentColor"><path d="M2 3h10v1H2zM5 3V2h4v1M3 4h8l-.8 8H3.8L3 4zm2 2v4h1V6zm2 0v4h1V6z"/></svg>
      </button>` : ''}
    </div>`;
  }).join('');
}


function desenharGrafico(porCat, total, destaque) {
  const svg = document.getElementById('grafico-svg');
  const legDiv = document.getElementById('grafico-legenda');
  const wrap = document.getElementById('grafico-wrap');

  if (!porCat || Object.keys(porCat).length === 0) {
    wrap.classList.remove('visivel');
    return;
  }
  wrap.classList.add('visivel');

  const cx = 90, cy = 90, r = 70, espessura = 28;
  const ri = r - espessura;
  const entradas = Object.entries(porCat).sort((a,b) => b[1]-a[1]);

  let angulo = -Math.PI / 2;
  let paths = '';

  entradas.forEach(([cat, val]) => {
    const fatia = (val / total) * 2 * Math.PI;
    const aFim = angulo + fatia;
    const x1 = cx + r * Math.cos(angulo);
    const y1 = cy + r * Math.sin(angulo);
    const x2 = cx + r * Math.cos(aFim);
    const y2 = cy + r * Math.sin(aFim);
    const xi1 = cx + ri * Math.cos(aFim);
    const yi1 = cy + ri * Math.sin(aFim);
    const xi2 = cx + ri * Math.cos(angulo);
    const yi2 = cy + ri * Math.sin(angulo);
    const arcoGrande = fatia > Math.PI ? 1 : 0;
    const cor = CAT_COLORS[cat] || CAT_COLORS['outros'];
    const isDestaque = destaque && cat === destaque;
    const opacidade = destaque ? (isDestaque ? 1 : 0.2) : 1;
    const escala = isDestaque ? 'scale(1.04)' : 'scale(1)';
    const d = `M ${x1} ${y1} A ${r} ${r} 0 ${arcoGrande} 1 ${x2} ${y2} L ${xi1} ${yi1} A ${ri} ${ri} 0 ${arcoGrande} 0 ${xi2} ${yi2} Z`;
    paths += `<path d="${d}" fill="${cor}" opacity="${opacidade}" style="transform-origin:${cx}px ${cy}px;transform:${escala};transition:all 0.3s" />`;
    angulo = aFim;
  });

  // Texto central
  const labelCentro = destaque ? destaque : '';
  const pct = destaque && porCat[destaque] ? Math.round((porCat[destaque]/total)*100) : '';
  paths += `<text x="${cx}" y="${cy - 6}" text-anchor="middle" font-size="11" fill="var(--text-muted)" font-family="DM Mono,monospace">${labelCentro}</text>`;
  paths += `<text x="${cx}" y="${cy + 12}" text-anchor="middle" font-size="18" font-weight="700" fill="var(--accent)" font-family="DM Mono,monospace">${pct ? pct+'%' : ''}</text>`;

  svg.innerHTML = paths;

  // Legenda
  legDiv.innerHTML = entradas.map(([cat, val]) => {
    const cor = CAT_COLORS[cat] || CAT_COLORS['outros'];
    const cls = destaque ? (cat === destaque ? 'leg-item destaques' : 'leg-item apagado') : 'leg-item';
    return `<div class="${cls}" onclick="destacarCategoria('${cat}')">
      <div class="leg-dot" style="background:${cor}"></div>
      ${cat}
    </div>`;
  }).join('');
}

let categoriaDestacada = null;
function destacarCategoria(cat) {
  if (categoriaDestacada === cat) {
    categoriaDestacada = null;
  } else {
    categoriaDestacada = cat;
  }
  // Atualizar pills (remover/adicionar classe ativa)
  document.querySelectorAll('.cat-pill').forEach(el => {
    const nome = el.textContent.trim().split('·')[0].trim();
    if (categoriaDestacada && nome === categoriaDestacada) {
      el.classList.add('ativa');
    } else {
      el.classList.remove('ativa');
    }
  });
  // Redesenhar gráfico
  if (filtroAtivo) {
    renderComFiltro(filtroAtivo);
    return;
  }
  const agora = new Date();
  const mesAtual = gastos.filter(g => {
    const d = new Date(g.ts);
    return d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
  });
  const total = mesAtual.reduce((s, g) => s + g.valor, 0);
  const porCat = {};
  mesAtual.forEach(g => { porCat[g.categoria] = (porCat[g.categoria]||0) + g.valor; });
  desenharGrafico(porCat, total, categoriaDestacada);
}

function atualizarTotal() {
  const agora = new Date();
  const mesAtual = gastos.filter(g => {
    const d = new Date(g.ts);
    return d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
  });
  const total = mesAtual.reduce((s, g) => s + g.valor, 0);
  document.getElementById('total-num').textContent = formatMoeda(total);

  if (mesAtual.length === 0) {
    document.getElementById('total-period').textContent = 'nenhum gasto ainda';
    document.getElementById('cats-row').innerHTML = '';
    document.getElementById('grafico-wrap').classList.remove('visivel');
    return;
  }
  const mes = agora.toLocaleDateString('pt-BR', { month:'long', year:'numeric' });
  document.getElementById('total-period').textContent = `${mesAtual.length} lançamento${mesAtual.length>1?'s':''} em ${mes}`;

  const porCat = {};
  mesAtual.forEach(g => { porCat[g.categoria] = (porCat[g.categoria]||0) + g.valor; });
  const html = Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([cat, val]) =>
    `<div class="cat-pill${categoriaDestacada === cat ? ' ativa' : ''}" onclick="destacarCategoria('${cat}')">
      <div class="cat-dot" style="background:${CAT_COLORS[cat]||CAT_COLORS['outros']}"></div>
      ${cat} · R$ ${formatMoeda(val)}
    </div>`
  ).join('');
  document.getElementById('cats-row').innerHTML = html;
  desenharGrafico(porCat, total, categoriaDestacada);
}

    return;
  }

    <div class="gasto-item" id="item-${g.id}">
      <div class="gasto-cat-bar" style="background:${cor}"></div>

        <div class="gasto-meta">
          <span class="gasto-cat-tag" style="color:${cor}">${g.categoria}</span>

      <div class="gasto-valor">R$ ${formatMoeda(g.valor)}</div>

      </button>

}

function deletarGasto(id) {
  gastos = gastos.filter(g => g.id !== id);
  saveGastos();
  atualizarTotal();
  renderHistorico();
}

function limparTudo() {
  if (!confirm('Apagar todos os gastos?')) return;
  gastos = [];
  saveGastos();
  atualizarTotal();
  renderHistorico();
  esconderConsulta();
}

  el.classList.add('show');
  document.getElementById('send-btn').disabled = true;
}
function esconderProcessando() {
  document.getElementById('processing').classList.remove('show');
  document.getElementById('send-btn').disabled = false;
}
function mostrarConsulta(texto) {
  document.getElementById('consulta-card').innerHTML = texto;
  document.getElementById('consulta-resp').classList.add('show');
}
function esconderConsulta() {
  document.getElementById('consulta-resp').classList.remove('show');
}

async function processar() {
  const input = document.getElementById('gasto-input');
  const texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  esconderConsulta();

  const ehConsulta = /total|quanto|histórico|gastei|resumo|listar|mostrar|hoje|mês|semana|categoria|devo|parcela|junho|julho|agosto|setembro|outubro|novembro|dezembro|janeiro|fevereiro|março|abril|maio|próximo|futuro/i.test(texto);

  mostrarProcessando(ehConsulta ? 'consultando...' : 'entendendo gasto...');

  const agora = new Date();
  const historicoTexto = gastos.length > 0
    ? gastos.slice(-20).map(g =>
        `- ${new Date(g.ts).toLocaleDateString('pt-BR')}: ${g.descricao}${g.parcelaInfo ? ' ('+g.parcelaInfo+')' : ''} · R$ ${g.valor.toFixed(2)} · ${g.categoria}`
      ).join('\n')
    : 'nenhum gasto registrado ainda';
  const parcelasTexto = parcelasFuturas.length > 0
    ? '\nParcelas agendadas nos próximos meses:\n' + parcelasFuturas.map(p =>
        `- ${new Date(p.vencimento).toLocaleDateString('pt-BR', {month:'long',year:'numeric'})}: ${p.descricao} (${p.parcelaInfo}) · R$ ${p.valor.toFixed(2)} · ${p.categoria}`
      ).join('\n')
    : '';

  const systemPrompt = ehConsulta
    ? `Você é um assistente de finanças pessoais. Responda perguntas sobre os gastos do usuário de forma direta e clara em português. Use os dados fornecidos. Seja conciso, máximo 3 linhas. Use R$ com valores formatados. Hoje é ${agora.toLocaleDateString('pt-BR')}.`
    : `Você é um parser de gastos financeiros. O usuário vai descrever um gasto em linguagem natural. Extraia as informações e retorne SOMENTE um JSON válido no formato:
{"valor": 0.00, "descricao": "descrição limpa", "categoria": "uma das opções", "parcelas": null}
Se o usuário mencionar parcelamento (ex: "6x", "em 6 vezes", "parcelado em 3x"), retorne:
{"valor": 0.00, "descricao": "descrição limpa", "categoria": "uma das opções", "parcelas": 6}
Onde valor é o valor TOTAL da compra e parcelas é o número de parcelas.
Categorias disponíveis e exemplos:
- alimentação: mercado, padaria, restaurante, lanche, feira, açougue, café
- transporte: gasolina, uber, ônibus, estacionamento, metrô, pedágio, moto
- saúde: farmácia, médico, dentista, academia, exame, plano de saúde
- lazer: cinema, bar, festa, show, jogo, passeio, diversão
- casa: aluguel, energia, água, internet, reforma, móveis, limpeza
- educação: curso, aula, escola, faculdade, livro, material escolar, treinamento, mensalidade escolar
- tecnologia: celular, computador, software, aplicativo, Netflix, Spotify, assinatura digital, streaming
- vestuário: roupa, calçado, tênis, camisa, calça, acessório
- pets: ração, veterinário, banho pet, remédio animal
- viagem: hotel, passagem, hospedagem, turismo, mala
- serviços: cabeleireiro, conserto, manutenção, lavanderia, entrega
- outros: qualquer coisa que não se encaixe nas categorias acima
Regras:
- valor deve ser um número float
- descricao deve ser curta e limpa (máximo 30 chars)
- categoria deve ser exatamente uma das opções listadas
- NÃO retorne nada além do JSON puro, sem markdown, sem explicação`;

  const userMessage = ehConsulta
    ? `Meus gastos:\n${historicoTexto}${parcelasTexto}\n\nPergunta: ${texto}`
    : texto;

  try {
    const resp = await fetch('https://soft-mode-5249.odileiods.workers.dev', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMessage }]
      })
    });

    const data = await resp.json();
    const respText = data.content?.map(c => c.text || '').join('').trim();

    esconderProcessando();

    if (ehConsulta) {
      mostrarConsulta(respText);
      // Detectar mês mencionado e aplicar filtro
      const filtroDetectado = detectarMesTexto(texto);
      if (filtroDetectado) {
        aplicarFiltro(filtroDetectado);
      } else {
        // Detectar categoria e destacar no gráfico
        const catsDetect = Object.keys(CAT_COLORS);
        const catEncontrada = catsDetect.find(c => texto.toLowerCase().includes(c));
        if (catEncontrada) {
          categoriaDestacada = catEncontrada;
          const agora2 = new Date();
          const mes2 = gastos.filter(g => {
            const d = new Date(g.ts);
            return d.getMonth() === agora2.getMonth() && d.getFullYear() === agora2.getFullYear();
          });
          const total2 = mes2.reduce((s, g) => s + g.valor, 0);
          const porCat2 = {};
          mes2.forEach(g => { porCat2[g.categoria] = (porCat2[g.categoria]||0) + g.valor; });
          desenharGrafico(porCat2, total2, catEncontrada);
        }
      }
    } else {
      try {
        const clean = respText.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);
        if (parsed.valor && parsed.descricao && parsed.categoria) {
          const valorTotal = parseFloat(parsed.valor);
          const numParcelas = parsed.parcelas ? parseInt(parsed.parcelas) : 1;
          const valorParcela = numParcelas > 1 ? valorTotal / numParcelas : valorTotal;
          const parcelaInfo = numParcelas > 1 ? `parcela 1/${numParcelas}` : null;
          const novoGasto = {
            id: Date.now().toString(),
            valor: valorParcela,
            descricao: parsed.descricao,
            categoria: parsed.categoria.toLowerCase(),
            ts: Date.now(),
            parcelaInfo: parcelaInfo
          };
          gastos.push(novoGasto);
          if (numParcelas > 1) {
            const agora = new Date();
            for (let i = 1; i < numParcelas; i++) {
              const venc = new Date(agora.getFullYear(), agora.getMonth() + i, 1);
              parcelasFuturas.push({
                id: Date.now().toString() + i,
                valor: valorParcela,
                descricao: parsed.descricao,
                categoria: parsed.categoria.toLowerCase(),
                vencimento: venc.toISOString(),
                parcelaInfo: `parcela ${i+1}/${numParcelas}`
              });
            }
            saveParcelas();
            mostrarConsulta(`✓ ${parsed.descricao} — R$ ${valorParcela.toFixed(2)}/mês por ${numParcelas}x. Parcelas agendadas!`);
          }
          saveGastos();
          atualizarTotal();
          renderHistorico();
        } else {
          mostrarConsulta('Não entendi. Tente: "padaria 50" ou "gasolina 180".');
        }
      } catch(e) {
        mostrarConsulta(respText || 'Não consegui interpretar. Tente de novo.');
      }
    }
  } catch(err) {
    esconderProcessando();
    mostrarConsulta('Erro de conexão. Verifique sua internet.');
  }
}

let mesesSelecionados = new Set();

function getMesesComGastos() {
  const mapa = {};
  gastos.forEach(g => {
    const d = new Date(g.ts);
    const chave = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    if (!mapa[chave]) mapa[chave] = { ano: d.getFullYear(), mes: d.getMonth(), total: 0, qtd: 0 };
    mapa[chave].total += g.valor;
    mapa[chave].qtd++;
  });
  parcelasFuturas.forEach(p => {
    const d = new Date(p.vencimento);
    const chave = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    if (!mapa[chave]) mapa[chave] = { ano: d.getFullYear(), mes: d.getMonth(), total: 0, qtd: 0 };
    mapa[chave].total += p.valor;
    mapa[chave].qtd++;
  });
  return Object.entries(mapa).sort((a,b) => b[0].localeCompare(a[0])).map(([k,v]) => ({...v, chave: k}));
}

function abrirModalPDF() {
  mesesSelecionados.clear();
  const meses = getMesesComGastos();
  const container = document.getElementById('mes-opcoes');
  if (meses.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:16px">nenhum gasto registrado ainda</div>';
    document.getElementById('btn-gerar-pdf').disabled = true;
  } else {
    container.innerHTML = meses.map(m => {
      const nomeMes = new Date(m.ano, m.mes, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
      return `<div class="mes-opcao" onclick="toggleMes('${m.chave}', this)">
        <div class="mes-opcao-check"></div>
        <div class="mes-opcao-info">
          <div class="mes-opcao-nome">${nomeMes}</div>
          <div class="mes-opcao-total">${m.qtd} lançamento${m.qtd>1?'s':''} · R$ ${formatMoeda(m.total)}</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('btn-gerar-pdf').disabled = true;
  }
  document.getElementById('modal-pdf').classList.add('visivel');
}

function fecharModalPDF() {
  document.getElementById('modal-pdf').classList.remove('visivel');
}

function toggleMes(chave, el) {
  if (mesesSelecionados.has(chave)) {
    mesesSelecionados.delete(chave);
    el.classList.remove('selecionado');
  } else {
    mesesSelecionados.add(chave);
    el.classList.add('selecionado');
  }
  document.getElementById('btn-gerar-pdf').disabled = mesesSelecionados.size === 0;
}

function gerarPDF() {
  fecharModalPDF();
  const mesesOrdenados = [...mesesSelecionados].sort();
  let conteudo = '';

  mesesOrdenados.forEach(chave => {
    const [ano, mesIdx] = chave.split('-').map(Number);
    const nomeMes = new Date(ano, mesIdx, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

    const gastosDoMes = gastos.filter(g => {
      const d = new Date(g.ts);
      return d.getMonth() === mesIdx && d.getFullYear() === ano;
    });
    const parcelasDoMes = parcelasFuturas.filter(p => {
      const d = new Date(p.vencimento);
      return d.getMonth() === mesIdx && d.getFullYear() === ano;
    }).map(p => ({...p, ts: new Date(p.vencimento).getTime(), _agendado: true}));

    const todos = [...gastosDoMes, ...parcelasDoMes].sort((a,b) => a.ts - b.ts);
    const total = todos.reduce((s,g) => s + g.valor, 0);

    const porCat = {};
    todos.forEach(g => { porCat[g.categoria] = (porCat[g.categoria]||0) + g.valor; });
    const catHtml = Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([cat, val]) =>
      `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#f5f5f5;border-radius:999px;font-size:11px;margin:2px">
        <span style="width:7px;height:7px;border-radius:50%;background:${CAT_COLORS[cat]||'#999'};display:inline-block"></span>
        ${cat} · R$ ${formatMoeda(val)}
      </span>`
    ).join('');

    const itensHtml = todos.map(g =>
      `<tr>
        <td style="padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:12px;color:#222">
          ${g.descricao}${g.parcelaInfo ? ` <span style="font-size:10px;color:#999">(${g.parcelaInfo})</span>` : ''}
          ${g._agendado ? '<span style="font-size:9px;color:#aaa;margin-left:4px">agendado</span>' : ''}
        </td>
        <td style="padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:11px;color:#888">${g.categoria}</td>
        <td style="padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:12px;color:#222;text-align:right;font-weight:600">R$ ${formatMoeda(g.valor)}</td>
      </tr>`
    ).join('');

    conteudo += `
      <div style="page-break-after:always;padding:32px 40px;max-width:700px;margin:0 auto">
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px">
          <span style="font-family:monospace;font-size:22px;font-weight:700;color:#111">falou, lançou</span>
          <span style="font-size:12px;color:#aaa;font-family:monospace">// relatório</span>
        </div>
        <div style="font-size:13px;color:#888;font-family:monospace;margin-bottom:24px;text-transform:uppercase;letter-spacing:1px">${nomeMes}</div>

        <div style="background:#f9f9f9;border-radius:12px;padding:20px;margin-bottom:20px">
          <div style="font-size:11px;color:#aaa;font-family:monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">total do mês</div>
          <div style="font-size:32px;font-weight:700;color:#111;font-family:monospace">R$ ${formatMoeda(total)}</div>
          <div style="font-size:12px;color:#999;margin-top:6px">${todos.length} lançamento${todos.length>1?'s':''}</div>
          <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:4px">${catHtml}</div>
        </div>

        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:#f5f5f5">
              <th style="padding:8px 12px;text-align:left;font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">descrição</th>
              <th style="padding:8px 12px;text-align:left;font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">categoria</th>
              <th style="padding:8px 12px;text-align:right;font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">valor</th>
            </tr>
          </thead>
          <tbody>${itensHtml}</tbody>
          <tfoot>
            <tr>
              <td colspan="2" style="padding:10px 12px;font-size:12px;font-weight:700;color:#111;border-top:2px solid #222">total</td>
              <td style="padding:10px 12px;text-align:right;font-size:14px;font-weight:700;color:#111;border-top:2px solid #222">R$ ${formatMoeda(total)}</td>
            </tr>
          </tfoot>
        </table>
        <div style="margin-top:32px;font-size:10px;color:#ccc;font-family:monospace;text-align:center">gerado por falou, lançou · ${new Date().toLocaleDateString('pt-BR')}</div>
      </div>`;
  });

  const janela = window.open('', '_blank');
  janela.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatório Falou, Lançou</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#fff}
    @media print{@page{margin:0}}</style></head><body>${conteudo}
    <script>window.onload=()=>{window.print()}<\/script></body></html>`);
  janela.document.close();
}
// ── FIM PDF ───────────────────────────────────────────────────────

let reconhecimento = null;
let gravando = false;

function alternarMic() {
  if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
    mostrarConsulta("Seu navegador não suporta voz. Use Chrome ou Edge.");
    return;
  }
  if (gravando) {
    reconhecimento.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  reconhecimento = new SR();
  reconhecimento.lang = "pt-BR";
  reconhecimento.interimResults = false;
  reconhecimento.maxAlternatives = 1;
  reconhecimento.onstart = () => {
    gravando = true;
    document.getElementById("mic-btn").classList.add("gravando");
    document.getElementById("processing-text").textContent = "ouvindo...";
    document.getElementById("processing").classList.add("show");
  };
  reconhecimento.onresult = (e) => {
    const texto = e.results[0][0].transcript;
    document.getElementById("gasto-input").value = texto;
  };
  reconhecimento.onend = () => {
    gravando = false;
    document.getElementById("mic-btn").classList.remove("gravando");
    document.getElementById("processing").classList.remove("show");
    const texto = document.getElementById("gasto-input").value.trim();
    if (texto) processar();
  };
  reconhecimento.onerror = () => {
    gravando = false;
    document.getElementById("mic-btn").classList.remove("gravando");
    document.getElementById("processing").classList.remove("show");
    mostrarConsulta("Não consegui ouvir. Tente novamente.");
  };
  reconhecimento.start();
}

document.getElementById('gasto-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') processar();
});

loadGastos();
atualizarTotal();
renderHistorico();
</script>
